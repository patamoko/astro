# =============================================================================
# astro-koharu Nginx Configuration (Optimized)
# =============================================================================
# Optimizations:
# - sendfile / tcp_nodelay / keepalive for connection efficiency
# - gzip_static for pre-compressed assets (zero CPU per request)
# - gzip fallback for dynamic responses
# - Aggressive static asset caching (immutable, 1 year)
# - HTML caching with ETag revalidation
# =============================================================================

sendfile on;
tcp_nodelay on;
keepalive_timeout 65;
types_hash_max_size 2048;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # ---- Gzip Static (serve pre-compressed .gz files) ----
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml application/javascript
               application/json application/rss+xml image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Static Assets (1 year, immutable) ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ---- HTML (1 hour, revalidate) ----
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ---- Pagefind Search ----
    location /pagefind/ {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ---- Routing ----
    location / {
        try_files $uri $uri/index.html =404;
    }

    # ---- RSS ----
    location = /rss.xml {
        add_header Content-Type "application/rss+xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        expires 1h;
    }

    # ---- Sitemap ----
    location = /sitemap-index.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        expires 1h;
    }

    location ~* ^/sitemap-\d+\.xml$ {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        expires 1h;
    }

    # ---- 404 ----
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
